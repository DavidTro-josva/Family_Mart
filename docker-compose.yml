version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: familymart-db
    restart: always
    environment:
      POSTGRES_USER: familymart_user
      POSTGRES_PASSWORD: familymart_secure_pass
      POSTGRES_DB: familymart_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U familymart_user -d familymart_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: familymart-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://familymart_user:familymart_secure_pass@db:5432/familymart_db?schema=public
      JWT_ACCESS_SECRET: super_secret_access_key_123!@#
      JWT_REFRESH_SECRET: super_secret_refresh_key_456!@#
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: familymart-frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  pgdata:
    driver: local
